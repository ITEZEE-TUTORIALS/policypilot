<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PolicyPilot Chat</title>
  <link rel="stylesheet" href="/styles.css">
  <script defer src="/app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar" aria-label="Application header">
      <a class="brand" href="/" aria-label="PolicyPilot home">
        <span class="brand-mark">PP</span>
        <span>
          <strong>PolicyPilot</strong>
          <small>Rust RAG assistant</small>
        </span>
      </a>

      <div class="topbar-actions">
        <span class="status-pill"><span class="status-light"></span>Local demo</span>
        <button class="button button-ghost" type="button" id="export-chat">Export</button>
        <button class="button button-ghost" type="button" id="clear-chat">Clear</button>
      </div>
    </header>

    <section class="chat-card" aria-label="PolicyPilot chat">
      <div class="chat-intro">
        <div>
          <p class="eyebrow">PolicyPilot</p>
          <h1>Ask the policy handbook.</h1>
          <p>
            A focused RAG demo: ask a question, get a grounded answer, open the evidence only when you need it.
          </p>
        </div>
        <div class="turn-counter" aria-label="Conversation turns">
          <span id="turn-count">0</span>
          <small>turns</small>
        </div>
      </div>

      <div class="demo-controls">
        <button class="thinking-toggle" type="button" id="toggle-thinking" aria-pressed="false">
          <span class="toggle-dot"></span>
          <span id="thinking-toggle-label">Show Thinking</span>
        </button>
        <span class="control-hint">Optional: show the RAG work-in-progress before the answer.</span>
      </div>

      <div id="sample-questions" class="sample-list" aria-label="Sample questions"></div>

      <div id="chat-history" class="chat-history" aria-live="polite"></div>

      <form id="question-form" class="composer" aria-label="Ask PolicyPilot">
        <label for="question">Message</label>
        <div class="composer-box">
          <textarea id="question" name="question" rows="1" autocomplete="off" spellcheck="true">Can I expense a hotel minibar?</textarea>
          <button class="button button-primary" type="submit">Ask</button>
        </div>
        <p class="composer-help">Enter sends. Shift + Enter adds a line.</p>
      </form>
    </section>
  </main>
</body>
</html>
